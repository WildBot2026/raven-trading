<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raven</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e2e8f0;font-family:system-ui,sans-serif;padding:8px;font-size:15px}
h1{color:#818cf8;font-size:20px;margin-bottom:8px}
h2{color:#64748b;font-size:13px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.c{background:rgba(17,17,34,0.85);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:8px;margin-bottom:6px}
.row{display:flex;gap:6px;flex-wrap:wrap}
.row>*{flex:1;min-width:200px}
.g{color:#4ade80}.r{color:#f87171}.gr{color:#64748b}
.v{font-size:24px;font-weight:800}
.sm{font-size:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:#64748b;text-align:left;padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.06)}
td{padding:4px 6px;border-top:1px solid rgba(255,255,255,0.03)}
.gr2{background:rgba(255,255,255,0.03);border-radius:4px;padding:6px;margin-bottom:4px}
</style>
</head>
<body>
<h1>🦅 Raven</h1>
<div id="root">Cargando...</div>

<script>
let data = {btc:0,btcC:0,wild:{},joako:{},trades:[]};

async function load(){
  try{
    // BTC
    let b=await(await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT')).json();
    data.btc=parseFloat(b.result.list[0].lastPrice);
    data.btcC=parseFloat(b.result.list[0].price24hPcnt)*100;
  }catch(e){}
  try{
    // FHE price
    let f=await(await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=FHEUSDT')).json();
    data.fhe=parseFloat(f.result.list[0].lastPrice);
    data.fheC=parseFloat(f.result.list[0].price24hPcnt)*100;
  }catch(e){}
  render();
}

function coin(name,bal,pr,usd,pnl,acct){
  let p=parseFloat(pr), u=parseFloat(usd);
  let s=bal?parseFloat(bal):0;
  return `<div class="gr2">
    <div style="display:flex;justify-content:space-between">
      <span style="font-weight:700">${name}</span>
      <span class="gr">${acct}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:20px;font-weight:800">
      <span>$${p.toFixed(p<1?5:4)}</span>
      <span class="${pnl>=0?'g':'r'}">$${u.toFixed(2)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:12px;color:#64748b">
      <span>${s.toFixed(s<1?4:2)} ${name}</span>
      <span>${pnl>=0?'+':''}$${pnl.toFixed(2)}</span>
    </div>
  </div>`;
}

function render(){
  let h=`
    <div class="row">
      <div class="c">
        <h2>Capital</h2>
        <div class="v">$113.91</div>
      </div>
      <div class="c">
        <h2>PNL 24h</h2>
        <div class="v g">+$8.91</div>
      </div>
      <div class="c">
        <h2>BTC</h2>
        <div class="v">$${data.btc?data.btc.toLocaleString():'--'}</div>
        <div class="sm ${data.btcC>=0?'g':'r'}">${data.btcC?(data.btcC>0?'+':'')+data.btcC.toFixed(2)+'%':'--'}</div>
      </div>
    </div>
    
    <div class="row">
      <div class="c">
        <h2>🐺 WILD</h2>
        ${coin('PEPE',7336406,data.fhe||0.00000418,30.72,0,'WILD')}
        ${coin('BSB',26.87,0.6054,16.27,0,'WILD')}
        ${coin('PENGU',853.1,0.01126,9.60,0,'WILD')}
        <div style="margin-top:4px;text-align:right;font-weight:700;color:#818cf8">$59.59</div>
      </div>
      <div class="c">
        <h2>🐺 JOAKO</h2>
        ${coin('TON',12.45,1.988,24.75,0,'JOAKO')}
        ${coin('PEPE',4680410,data.fhe||0.00000418,19.62,0,'JOAKO')}
        ${coin('MON',215.4,0.03228,6.96,0,'JOAKO')}
        <div style="margin-top:4px;text-align:right;font-weight:700;color:#818cf8">$54.32</div>
      </div>
    </div>
    
    <div class="c">
      <h2>FHE</h2>
      <div class="v">${data.fhe?'$'+data.fhe.toFixed(5):'--'}</div>
      <div class="sm ${data.fheC>=0?'g':'r'}">${data.fheC?'+'+(data.fheC>0?data.fheC.toFixed(1):'')+'%':'--'}</div>
      <div class="sm gr">Vendida ✅ (+$2.22 ganancia)</div>
    </div>
  `;
  document.getElementById('root').innerHTML=h;
}
load();
setInterval(load,15000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raven 🦅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;padding:10px}
.c{background:rgba(17,17,34,0.85);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px;margin-bottom:8px}
.h3{color:#64748b;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.v{font-size:18px;font-weight:800}
.g{color:#4ade80}.r{color:#f87171}.gr{color:#64748b}.x{font-size:11px}
.f{display:flex}.b{justify-content:space-between}.a{align-items:center}
.pc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px;margin-bottom:5px}
.tg{font-size:9px;padding:2px 5px;border-radius:4px;font-weight:600;display:inline-block}
.tw{background:rgba(129,140,248,0.15);color:#818cf8}
.tj{background:rgba(52,211,153,0.15);color:#34d399}
.tg2{font-size:9px;color:#64748b}.tg2 s{color:#4ade80;font-weight:600}
table{width:100%;font-size:10px;border-collapse:collapse}
th{color:#64748b;font-weight:500;text-align:left;padding:3px 4px;border-bottom:1px solid rgba(255,255,255,0.06)}
td{padding:3px 4px;border-bottom:1px solid rgba(255,255,255,0.03)}
.mt{margin-top:4px}.mb{margin-bottom:6px}
.h{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:700px){.h{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="a"><div style="padding:30px;text-align:center;color:#64748b">Cargando...</div></div>
<script>
(function(){
// ===== DATA =====
var d = {
  cap: 107.03, start: 100, pnl: 7.03, pnlp: "7.03",
  btc: 81178, btcc: 1.11,
  acc: {WILD:{c:56.56,s:60},JOAKO:{c:50.47,s:40}},
  pos: [
    {s:"ADA",a:"WILD",e:0.468,q:28.07,st:0.449,t8:0.505,t15:0.538,t25:0.585,pr:0.468},
    {s:"BLEND",a:"JOAKO",e:0.1176,q:112,st:0.113,t8:0.127,t15:0.135,t25:0.147,pr:0.138},
    {s:"ONDO",a:"JOAKO",e:0.3112,q:22.04,st:0.299,t8:0.336,t15:0.358,t25:0.389,pr:0.309},
    {s:"ONDO",a:"WILD",e:0.3112,q:30.42,st:0.299,t8:0.336,t15:0.358,t25:0.389,pr:0.309},
    {s:"TON",a:"JOAKO",e:1.823,q:12.72,st:1.75,t8:1.969,t15:2.096,t25:2.279,pr:1.837},
    {s:"TON",a:"WILD",e:1.862,q:16.79,st:1.788,t8:2.011,t15:2.141,t25:2.328,pr:1.837}
  ],
  tr: [
    {d:"05-04 19:06",s:"ATH",sd:"buy",q:2143.854,p:0.0062,v:13.29,pl:0,ac:"WILD"},
    {d:"05-04 08:40",s:"ONDO",sd:"buy",q:121.7,p:0.3112,v:37.87,pl:0,ac:"WILD"},
    {d:"05-04 08:40",s:"ONDO",sd:"buy",q:88.16,p:0.3112,v:27.44,pl:0,ac:"JOAKO"},
    {d:"05-04 19:02",s:"BILL",sd:"sell",q:954.6,p:0.0408,v:38.95,pl:0,ac:"WILD"}
  ],
  ch: [
    {t:"05-04 20:08",to:105.21,w:55.72,j:49.49},
    {t:"05-05 05:50",to:108.43,w:56.56,j:51.87},
    {t:"05-05 07:23",to:108.95,w:56.56,j:52.39},
    {t:"05-05 08:38",to:107.84,w:56.56,j:51.28},
    {t:"05-05 10:37",to:107.03,w:56.56,j:50.47}
  ]
};

function $(n){
  if(n==null)return'—';
  if(n>=1e3)return'$'+n.toFixed(0);
  if(n>=1)return'$'+n.toFixed(2);
  if(n>=0.01)return'$'+n.toFixed(4);
  return'$'+n.toFixed(6);
}
function q(n){
  if(!n)return'0';
  return n>=1e3?n.toFixed(0):n>=1?n.toFixed(2):n.toFixed(4);
}
function at(a){return a==='WILD'?'<span class="tg tw">WILD</span>':'<span class="tg tj">JOAKO</span>';}
function sb(s){return(s==='buy'||s==='Buy')?'<span class="g" style="font-weight:600;font-size:10px">BUY</span>':'<span class="r" style="font-weight:600;font-size:10px">SELL</span>';}

// ===== RENDER =====
var h='';

// HEADER
h+='<div class="c"><div class="f b a">';
h+='<div><span class="gr x">Capital</span> <span class="v '+(d.pnl>=0?'g':'r')+'">'+$(d.cap)+'</span></div>';
h+='<div><span class="gr x">PNL</span> <span class="v '+(d.pnl>=0?'g':'r')+'">'+(d.pnl>=0?'+':'')+$(d.pnl)+'</span></div>';
h+='<div><span class="gr x">BTC</span> <span class="v '+(d.btcc>=0?'g':'r')+'">'+$(d.btc)+'</span> <span class="x '+(d.btcc>=0?'g':'r')+'">('+(d.btcc>=0?'+':'')+d.btcc.toFixed(2)+'%)</span></div>';
h+='</div></div>';

// ACCOUNTS
h+='<div class="c"><div class="f b a">';
for(var a in d.acc){
  var ac=d.acc[a],ap=ac.c-ac.s;
  h+='<div><span class="gr x">'+a+'</span> <span class="v '+(ap>=0?'g':'r')+'">'+$(ac.c)+'</span> <span class="x '+(ap>=0?'g':'r')+'">('+(ap>=0?'+':'')+$(ap)+')</span></div>';
}
h+='</div></div>';

// TWO COLUMNS
h+='<div class="h">';
// LEFT: Positions
h+='<div><div class="c"><div class="h3">Posiciones ('+d.pos.length+')</div>';
d.pos.sort(function(a,b){return a.s.localeCompare(b.s);});
for(var i=0;i<d.pos.length;i++){
  var p=d.pos[i],lp=p.pr||0,pp=(lp-p.e)*p.q,pct=((lp/p.e)-1)*100;
  h+='<div class="pc"><div class="f b a">';
  h+='<div><span style="font-size:14px;font-weight:700;color:#f1f5f9">'+p.s+'</span> '+at(p.a)+' <span class="'+(pct>=0?'g':'r')+'" style="font-size:11px;font-weight:600">'+(pct>=0?'+':'')+pct.toFixed(2)+'%</span></div>';
  h+='<span class="'+(pp>=0?'g':'r')+'" style="font-weight:600;font-size:12px">'+(pp>=0?'+':'')+$(pp)+'</span>';
  h+='</div><div class="x mt" style="color:#64748b">Entry: <span style="color:#cbd5e1">'+$(p.e)+'</span> Qty: '+q(p.q)+' Act: <span>'+$(lp)+'</span></div>';
  h+='<div class="tg2 mt">Stop: <span class="r" style="font-weight:600">'+$(p.st)+'</span> Targets: <s>+8% '+$(p.t8)+'</s> <s>+15% '+$(p.t15)+'</s> <s>+25% '+$(p.t25)+'</s></div>';
  h+='</div>';
}
h+='</div></div>';

// RIGHT: Chart
h+='<div><div class="c"><div class="h3">Capital</div><canvas id="chart" style="width:100%;height:150px"></canvas></div></div>';

h+='</div>';

// TRADES
h+='<div class="c"><div class="h3">Trades ('+d.tr.length+')</div>';
if(d.tr.length){
  h+='<table><thead><tr><th>Fecha</th><th>Simbolo</th><th>Tipo</th><th style="text-align:right">Precio</th><th style="text-align:right">Cant</th><th style="text-align:right">PNL</th><th>Cuenta</th></tr></thead><tbody>';
  for(var i=d.tr.length-1;i>=0;i--){
    var t=d.tr[i];
    h+='<tr><td class="gr">'+(t.d||'—')+'</td><td style="font-weight:600">'+t.s+'</td><td>'+sb(t.sd)+'</td><td style="text-align:right">'+$(t.p)+'</td><td style="text-align:right">'+q(t.q)+'</td>';
    var tp=t.pl||0;
    h+='<td style="text-align:right;font-weight:600" class="'+(tp>=0?'g':'r')+'">'+(tp===0?'—':(tp>=0?'+':'')+$(tp))+'</td><td>'+at(t.ac)+'</td></tr>';
  }
  h+='</tbody></table>';
}else{
  h+='<div class="gr" style="text-align:center;padding:12px">Sin trades</div>';
}
h+='</div>';

document.getElementById('a').innerHTML=h;

// ===== CHART =====
var can=document.getElementById('chart');
if(can&&d.ch&&d.ch.length>1){
  var ctx=can.getContext('2d'),w=can.offsetWidth||300,he=150;
  can.width=w*2;can.height=he*2;can.style.width=w+'px';can.style.height=he+'px';
  ctx.scale(2,2);
  var pad={t:15,b:15,l:35,r:10},cw=w-pad.l-pad.r,ch=he-pad.t-pad.b;
  var max=0,min=1e9;
  for(var i=0;i<d.ch.length;i++){
    if(d.ch[i].to>max)max=d.ch[i].to;
    if(d.ch[i].to<min)min=d.ch[i].to;
  }
  var range=max-min||1;min-=range*0.1;max+=range*0.1;range=max-min;
  
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(var y=0;y<=4;y++){
    var yy=pad.t+(ch/4)*y;
    ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(w-pad.r,yy);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='8px sans-serif';ctx.textAlign='right';
    ctx.fillText('$'+(max-(range/4)*y).toFixed(1),pad.l-4,yy+3);
  }
  
  // Line + gradient
  var grad=ctx.createLinearGradient(0,pad.t,0,he-pad.b);
  grad.addColorStop(0,'rgba(74,222,128,0.12)');grad.addColorStop(1,'rgba(74,222,128,0.01)');
  
  ctx.beginPath();
  for(var i=0;i<d.ch.length;i++){
    var x=pad.l+(cw/(d.ch.length-1))*i;
    var y=pad.t+ch-((d.ch[i].to-min)/range)*ch;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
  }
  ctx.strokeStyle='#4ade80';ctx.lineWidth=1.5;ctx.stroke();
  
  // Fill
  var lastX=pad.l+(cw/(d.ch.length-1))*(d.ch.length-1);
  ctx.lineTo(lastX,he-pad.b);ctx.lineTo(pad.l,he-pad.b);ctx.closePath();ctx.fillStyle=grad;ctx.fill();
  
  // Points
  for(var i=0;i<d.ch.length;i++){
    var x=pad.l+(cw/(d.ch.length-1))*i;
    var y=pad.t+ch-((d.ch[i].to-min)/range)*ch;
    ctx.beginPath();ctx.arc(x,y,2,0,Math.PI*2);ctx.fillStyle='#4ade80';ctx.fill();
  }
}
})();
</script>
</body>
</html>

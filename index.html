<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raven 🦅</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;padding:6px;overflow-x:hidden}
.c{background:rgba(17,17,34,0.85);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:5px 7px;margin-bottom:4px}
.h3{color:#64748b;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.v{font-size:15px;font-weight:800}
.g{color:#4ade80}.r{color:#f87171}.gr{color:#64748b}.x{font-size:10px}
.pc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:4px 6px;margin-bottom:3px}
.tg{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:600;display:inline-block}
.tw{background:rgba(129,140,248,0.15);color:#818cf8}.tj{background:rgba(52,211,153,0.15);color:#34d399}
.tg2{font-size:9px;color:#64748b}.tg2 s{color:#4ade80;font-weight:600}
table{width:100%;font-size:9px;border-collapse:collapse}
th{color:#64748b;font-weight:500;text-align:left;padding:2px 3px;border-bottom:1px solid rgba(255,255,255,0.06)}
td{padding:2px 3px;border-bottom:1px solid rgba(255,255,255,0.03)}
.h{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.t{display:grid;grid-template-columns:auto auto 1fr;gap:3px}
select{background:#1a1a2e;color:#e2e8f0;border:1px solid rgba(255,255,255,0.08);border-radius:4px;padding:2px 3px;font-size:9px;max-width:90px}
canvas{width:100%!important;height:110px!important}
.sort-handle{cursor:grab;opacity:0.5;font-size:12px;display:inline-block;margin-right:4px;user-select:none}
.sort-handle:active{cursor:grabbing}
.edit-mode .c{border-color:rgba(129,140,248,0.3);border-style:dashed}
.edit-mode .c:hover{border-color:#818cf8}
#editBtn{position:fixed;bottom:10px;right:10px;z-index:999;background:#1a1a2e;border:1px solid rgba(255,255,255,0.1);color:#e2e8f0;border-radius:20px;padding:6px 14px;font-size:11px;cursor:pointer}
#editBtn.active{background:#818cf8;color:#0f0f1a;font-weight:600}
.sort-ghost{opacity:0.3;background:rgba(129,140,248,0.1)!important}
@media(max-width:700px){.h{grid-template-columns:1fr}.t{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div id="editBtn">✏️ Editar</div>
<div id="a"><div style="padding:20px;text-align:center;color:#64748b">Cargando...</div></div>
<script>
(function(){
var d = {
  cap: 107.03, start: 100, pnl: 7.03, pnlp: "7.03",
  btc: 81178, btcc: 1.11,
  acc: {WILD:{c:56.56,s:60},JOAKO:{c:50.47,s:40}},
  pos: [
    {s:"ADA",a:"WILD",e:0.468,q:28.07,st:0.449,t8:0.505,t15:0.538,t25:0.585,pr:0.468},
    {s:"BLEND",a:"JOAKO",e:0.1176,q:112,st:0.113,t8:0.127,t15:0.135,t25:0.147,pr:0.138},
    {s:"ONDO",a:"JOAKO",e:0.3112,q:22.04,st:0.299,t8:0.336,t15:0.358,t25:0.389,pr:0.309},
    {s:"ONDO",a:"WILD",e:0.3112,q:30.42,st:0.299,t8:0.336,t15:0.358,t25:0.389,pr:0.309},
    {s:"TON",a:"JOAKO",e:1.823,q:12.72,st:1.75,t8:1.969,t15:2.096,t25:2.279,pr:1.837},
    {s:"TON",a:"WILD",e:1.862,q:16.79,st:1.788,t8:2.011,t15:2.141,t25:2.328,pr:1.837}
  ],
  tr: [
    {d:"05-04 19:06",s:"ATH",sd:"buy",q:2143.854,p:0.0062,v:13.29,pl:0,ac:"WILD"},
    {d:"05-04 08:40",s:"ONDO",sd:"buy",q:121.7,p:0.3112,v:37.87,pl:0,ac:"WILD"},
    {d:"05-04 08:40",s:"ONDO",sd:"buy",q:88.16,p:0.3112,v:27.44,pl:0,ac:"JOAKO"},
    {d:"05-04 19:02",s:"BILL",sd:"sell",q:954.6,p:0.0408,v:38.95,pl:0,ac:"WILD"}
  ],
  allCoins: []
};

function $(n){
  if(n==null)return'—';
  if(n>=1e3)return'$'+n.toFixed(0);
  if(n>=1)return'$'+n.toFixed(2);
  if(n>=0.01)return'$'+n.toFixed(4);
  return'$'+n.toFixed(6);
}
function q(n){if(!n)return'0';return n>=1e3?n.toFixed(0):n>=1?n.toFixed(2):n.toFixed(4);}
function at(a){return a==='WILD'?'<span class="tg tw">W</span>':'<span class="tg tj">J</span>';}
function sb(s){return s==='buy'||s==='Buy'?'<span class="g" style="font-weight:700;font-size:9px">B</span>':'<span class="r" style="font-weight:700;font-size:9px">S</span>';}

async function fetchAllCoins(){
  try{
    var r=await fetch('https://api.bybit.com/v5/market/tickers?category=spot');
    var j=await r.json();
    if(j.retCode!==0||!j.result||!j.result.list)return;
    var raw=j.result.list,coins=[];
    for(var i=0;i<raw.length;i++){
      var t=raw[i];
      if(t.symbol.indexOf('USDT')===-1)continue;
      if(parseFloat(t.volume24h||0)<100000)continue;
      coins.push(t.symbol);
    }
    coins.sort(function(a,b){return a.localeCompare(b);});
    d.allCoins=coins;
    populateSelects(coins);
    render();
    loadAllCharts();
  }catch(e){render();}
}

function populateSelects(coins){
  var top=['BTCUSDT','ETHUSDT','SOLUSDT','DOGEUSDT','XRPUSDT','ADAUSDT','TONUSDT','LINKUSDT','SUIUSDT','AVAXUSDT','TRXUSDT','DOTUSDT','UNIUSDT','PEPEUSDT','SHIBUSDT','APTUSDT','ARBUSDT','OPUSDT','INJUSDT','TIAUSDT','SEIUSDT','WIFUSDT','BONKUSDT','NOTUSDT','PENGUUSDT','DOGSUSDT','LUNCUSDT','FTTUSDT','FHEUSDT'];
  for(var i=0;i<d.pos.length;i++){var sym=d.pos[i].s+'USDT';if(top.indexOf(sym)===-1)top.push(sym);}
  var merged=[];for(var i=0;i<top.length;i++){if(coins.indexOf(top[i])!==-1)merged.push(top[i]);}
  for(var i=0;i<coins.length;i++){if(merged.indexOf(coins[i])===-1)merged.push(coins[i]);}
  for(var ci=0;ci<3;ci++){
    var sel=document.getElementById('coin'+ci);
    if(!sel)continue;
    sel.innerHTML='';
    for(var i=0;i<merged.length;i++){
      var opt=document.createElement('option');
      opt.value=merged[i];opt.textContent=merged[i].replace('USDT','');
      if((ci===0&&merged[i]==='BTCUSDT')||(ci===1&&merged[i]==='ETHUSDT')||(ci===2&&merged[i]==='ADAUSDT'))opt.selected=true;
      sel.appendChild(opt);
    }
  }
}

function render(){
  // Load saved order or default
  var saved=null;
  try{saved=JSON.parse(localStorage.getItem('ravenLayout'));}catch(e){}
  if(!saved)saved=['header','cols','trades'];

  var h='';
  var body=document.getElementById('a');
  body.style.display='none';

  var isEdit=window.editMode||false;
  var cls=isEdit?'edit-mode':'';

  // Wrap everything in sortable containers
  h+='<div id="layoutWrap" class="'+cls+'">';

  h+='<div class="layout-item" data-id="header">';
  h+='<div class="t">';
  var wa=d.acc.WILD,wap=wa.c-wa.s;
  h+='<div class="c" style="padding:5px 8px;text-align:center"><span class="x gr" style="font-size:9px">WILD</span> <span class="v '+(wap>=0?'g':'r')+'" style="font-size:18px">'+$(wa.c)+'</span> <span style="font-size:10px" class="'+(wap>=0?'g':'r')+'">'+(wap>=0?'+':'')+$(wap)+'</span></div>';
  var ja=d.acc.JOAKO,jap=ja.c-ja.s;
  h+='<div class="c" style="padding:5px 8px;text-align:center"><span class="x gr" style="font-size:9px">JOAKO</span> <span class="v '+(jap>=0?'g':'r')+'" style="font-size:18px">'+$(ja.c)+'</span> <span style="font-size:10px" class="'+(jap>=0?'g':'r')+'">'+(jap>=0?'+':'')+$(jap)+'</span></div>';
  h+='<div class="c" style="padding:5px 12px;text-align:right"><span class="x gr" style="font-size:9px">TOTAL</span> <span class="v '+(d.pnl>=0?'g':'r')+'" style="font-size:22px">'+$(d.cap)+'</span> <span style="font-size:10px" class="'+(d.pnl>=0?'g':'r')+'">'+(d.pnl>=0?'+':'')+$(d.pnl)+' ('+(d.pnl>=0?'+':'')+d.pnlp+'%)</span></div>';
  h+='</div></div>';

  h+='<div class="layout-item" data-id="cols">';
  h+='<div class="h">';
  // LEFT: Positions
  h+='<div><div class="c" style="padding:5px 7px"><div class="h3" style="font-size:10px"><span class="sort-handle">⠿</span>📌 Posiciones ('+d.pos.length+')</div>';
  d.pos.sort(function(a,b){return a.s.localeCompare(b.s);});
  for(var i=0;i<d.pos.length;i++){
    var p=d.pos[i],lp=p.pr||0,pct=((lp/p.e)-1)*100,a=Math.round(pct);
    h+='<div class="pc" style="padding:4px 6px">';
    h+='<span style="font-size:14px;font-weight:700;color:#f1f5f9">'+p.s+'</span> '+at(p.a)+' <span style="font-size:12px;font-weight:700" class="'+(pct>=0?'g':'r')+'">'+(a>=0?'+':'')+a+'%</span>';
    h+='<div style="font-size:12px;color:#64748b;margin-top:1px">Entry: <span style="color:#cbd5e1">'+$(p.e)+'</span> | Act: <span style="color:#cbd5e1">'+$(lp)+'</span> | '+q(p.q)+'</div>';
    h+='<div class="tg2" style="font-size:10px">Stop: <span class="r" style="font-weight:600">'+$(p.st)+'</span> | +8% <s>'+$(p.t8)+'</s> +15% <s>'+$(p.t15)+'</s> +25% <s>'+$(p.t25)+'</s></div>';
    h+='</div>';
  }
  h+='</div></div>';
  // RIGHT: Charts
  h+='<div>';
  for(var ci=0;ci<3;ci++){
    var tfId='tf'+ci;
    h+='<div class="c" style="padding:4px 6px"><div class="h3" style="font-size:9px"><span class="sort-handle">⠿</span>🕯 <select id="coin'+ci+'" class="coinSel"></select> <select id="'+tfId+'" class="tfSel"><option value="15">15m</option><option value="60" selected>1h</option><option value="240">4h</option><option value="D">1d</option></select></div><canvas id="chart'+ci+'"></canvas></div>';
  }
  h+='</div>';
  h+='</div></div>';

  h+='<div class="layout-item" data-id="trades">';
  h+='<div class="c" style="padding:4px 7px"><div class="h3" style="font-size:10px"><span class="sort-handle">⠿</span>📜 Trades ('+d.tr.length+')</div>';
  if(d.tr.length){
    h+='<table><thead><tr><th style="font-size:10px">Fecha</th><th style="font-size:10px">Sim</th><th style="font-size:10px">T</th><th style="text-align:right;font-size:10px">Pr.</th><th style="text-align:right;font-size:10px">Q</th><th style="font-size:10px">Cta</th></tr></thead><tbody>';
    for(var i=d.tr.length-1;i>=0;i--){
      var t=d.tr[i];
      h+='<tr><td class="gr" style="font-size:10px">'+(t.d||'—').substring(0,11)+'</td><td style="font-weight:600;font-size:10px">'+t.s+'</td><td style="font-size:10px">'+sb(t.sd)+'</td><td style="text-align:right;font-size:10px">'+$(t.p)+'</td><td style="text-align:right;font-size:10px">'+q(t.q)+'</td><td style="font-size:10px">'+at(t.ac)+'</td></tr>';
    }
    h+='</tbody></table>';
  }
  h+='</div></div>';

  h+='</div>';

  document.getElementById('a').innerHTML=h;
  body.style.display='';

  // Re-order from saved layout
  var wrap=document.getElementById('layoutWrap');
  if(saved&&wrap){
    for(var si=0;si<saved.length;si++){
      var el=wrap.querySelector('[data-id="'+saved[si]+'"]');
      if(el)wrap.appendChild(el);
    }
  }

  // Bind chart controls
  for(var ci=0;ci<3;ci++){
    var cs=document.getElementById('coin'+ci);
    var ts=document.getElementById('tf'+ci);
    if(cs)cs.onchange=(function(i){return function(){loadChart(i);};})(ci);
    if(ts)ts.onchange=(function(i){return function(){loadChart(i);};})(ci);
  }

  // Init Sortable
  initSortable();
}

function initSortable(){
  if(typeof Sortable==='undefined')return;
  var wrap=document.getElementById('layoutWrap');
  if(!wrap)return;
  if(window._sortable)window._sortable.destroy();
  window._sortable=new Sortable(wrap,{
    animation:150,
    handle:'.sort-handle',
    ghostClass:'sort-ghost',
    disabled:!window.editMode,
    onEnd:function(){/*don't auto-save, user will say "fijalos"*/}
  });
}

function loadChart(idx){
  var coin=document.getElementById('coin'+idx);
  var tf=document.getElementById('tf'+idx);
  if(!coin||!tf)return;
  fetchAndDrawCandles('chart'+idx,coin.value,tf.value);
}

function loadAllCharts(){
  for(var i=0;i<3;i++){setTimeout(function(n){return function(){loadChart(n);};}(i),100);}
}

async function fetchAndDrawCandles(id,symbol,tf){
  var can=document.getElementById(id);
  if(!can)return;
  try{
    var r=await fetch('https://api.bybit.com/v5/market/kline?category=spot&symbol='+symbol+'&interval='+tf+'&limit=60');
    var j=await r.json();
    if(j.retCode!==0||!j.result||!j.result.list)return;
    drawCandles(id,j.result.list.reverse());
  }catch(e){}
}

function drawCandles(id,data){
  var can=document.getElementById(id);
  if(!can||!data||data.length<2)return;
  var ctx=can.getContext('2d'),w=can.parentElement.offsetWidth||280,he=110;
  can.width=w*2;can.height=he*2;can.style.width=w+'px';can.style.height=he+'px';
  ctx.scale(2,2);
  var pad={t:10,b:12,l:30,r:3},cw=w-pad.l-pad.r,ch=he-pad.t-pad.b;
  var o=[],h=[],l=[],c=[];
  for(var i=0;i<data.length;i++){o.push(parseFloat(data[i][1]));h.push(parseFloat(data[i][2]));l.push(parseFloat(data[i][3]));c.push(parseFloat(data[i][4]));}
  var mx=-1e9,mn=1e9;
  for(var i=0;i<data.length;i++){if(h[i]>mx)mx=h[i];if(l[i]<mn)mn=l[i];}
  var range=mx-mn||1;mn-=range*0.05;mx+=range*0.05;range=mx-mn;
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(var y=0;y<=2;y++){var yy=pad.t+(ch/2)*y;ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(w-pad.r,yy);ctx.stroke();ctx.fillStyle='#475569';ctx.font='7px sans-serif';ctx.textAlign='right';var tmp=mx-(range/2)*y;ctx.fillText(tmp.toFixed(tmp>10?0:3),pad.l-2,yy+2);}
  var candleW=Math.max(1,cw/data.length-1);
  for(var i=0;i<data.length;i++){var x=pad.l+(cw/data.length)*i;var yO=pad.t+ch-((o[i]-mn)/range)*ch,yC=pad.t+ch-((c[i]-mn)/range)*ch,yH=pad.t+ch-((h[i]-mn)/range)*ch,yL=pad.t+ch-((l[i]-mn)/range)*ch,isG=c[i]>=o[i],col=isG?'#4ade80':'#f87171';ctx.strokeStyle=col;ctx.lineWidth=0.7;ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();var tp=Math.min(yO,yC),bt=Math.max(yO,yC);ctx.fillStyle=col;ctx.fillRect(x-candleW/2,tp,candleW,Math.max(1,bt-tp));}
}

// ===== TOGGLE EDIT MODE =====
var btn=document.getElementById('editBtn');
btn.onclick=function(){
  window.editMode=!window.editMode;
  var body=document.getElementById('a');
  if(!body)return;
  if(window.editMode){
    btn.textContent='🔒 Fijar';
    btn.className='active';
    var allItems=body.querySelectorAll('.layout-item');
    for(var i=0;i<allItems.length;i++)allItems[i].classList.add('edit-mode-item');
    var wrap=document.getElementById('layoutWrap');
    if(wrap)wrap.classList.add('edit-mode');
    if(window._sortable)window._sortable.option('disabled',false);
  } else {
    // Save order
    var wrap=document.getElementById('layoutWrap');
    if(wrap){
      var items=wrap.querySelectorAll('.layout-item');
      var order=[];
      for(var i=0;i<items.length;i++)order.push(items[i].getAttribute('data-id'));
      try{localStorage.setItem('ravenLayout',JSON.stringify(order));}catch(e){}
      btn.textContent='✅ Fijado';
      setTimeout(function(){btn.textContent='✏️ Editar';btn.className='';},1500);
    }
    if(wrap)wrap.classList.remove('edit-mode');
    if(window._sortable)window._sortable.option('disabled',true);
  }
};

// Start
fetchAllCoins();
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raven 🦅</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;padding:8px;overflow-x:hidden}
.c{background:rgba(17,17,34,0.85);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:6px 8px;margin-bottom:5px}
.h3{color:#64748b;font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.v{font-size:15px;font-weight:800}
.g{color:#4ade80}.r{color:#f87171}.gr{color:#64748b}.x{font-size:10px}
.pc{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:6px;padding:5px 7px;margin-bottom:4px}
.tg{font-size:8px;padding:1px 4px;border-radius:3px;font-weight:600;display:inline-block}
.tw{background:rgba(129,140,248,0.15);color:#818cf8}.tj{background:rgba(52,211,153,0.15);color:#34d399}
.tg2{font-size:9px;color:#64748b}.tg2 s{color:#4ade80;font-weight:600}
table{width:100%;font-size:9px;border-collapse:collapse}
th{color:#64748b;font-weight:500;text-align:left;padding:2px 3px;border-bottom:1px solid rgba(255,255,255,0.06)}
td{padding:2px 3px;border-bottom:1px solid rgba(255,255,255,0.03)}
.h{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.t{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
@media(max-width:700px){.h{grid-template-columns:1fr}.t{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="a"><div style="padding:20px;text-align:center;color:#64748b">Cargando...</div></div>
<script>
(function(){
// ===== DATA =====
var d = {
  cap: 107.03, start: 100, pnl: 7.03, pnlp: "7.03",
  btc: 81178, btcc: 1.11,
  acc: {WILD:{c:56.56,s:60},JOAKO:{c:50.47,s:40}},
  pos: [
    {s:"ADA",a:"WILD",e:0.468,q:28.07,st:0.449,t8:0.505,t15:0.538,t25:0.585,pr:0.468},
    {s:"BLEND",a:"JOAKO",e:0.1176,q:112,st:0.113,t8:0.127,t15:0.135,t25:0.147,pr:0.138},
    {s:"ONDO",a:"JOAKO",e:0.3112,q:22.04,st:0.299,t8:0.336,t15:0.358,t25:0.389,pr:0.309},
    {s:"ONDO",a:"WILD",e:0.3112,q:30.42,st:0.299,t8:0.336,t15:0.358,t25:0.389,pr:0.309},
    {s:"TON",a:"JOAKO",e:1.823,q:12.72,st:1.75,t8:1.969,t15:2.096,t25:2.279,pr:1.837},
    {s:"TON",a:"WILD",e:1.862,q:16.79,st:1.788,t8:2.011,t15:2.141,t25:2.328,pr:1.837}
  ],
  tr: [
    {d:"05-04 19:06",s:"ATH",sd:"buy",q:2143.854,p:0.0062,v:13.29,pl:0,ac:"WILD"},
    {d:"05-04 08:40",s:"ONDO",sd:"buy",q:121.7,p:0.3112,v:37.87,pl:0,ac:"WILD"},
    {d:"05-04 08:40",s:"ONDO",sd:"buy",q:88.16,p:0.3112,v:27.44,pl:0,ac:"JOAKO"},
    {d:"05-04 19:02",s:"BILL",sd:"sell",q:954.6,p:0.0408,v:38.95,pl:0,ac:"WILD"}
  ],
  ch: [
    {t:"05-04 20:08",to:105.21,w:55.72,j:49.49},
    {t:"05-05 05:50",to:108.43,w:56.56,j:51.87},
    {t:"05-05 07:23",to:108.95,w:56.56,j:52.39},
    {t:"05-05 08:38",to:107.84,w:56.56,j:51.28},
    {t:"05-05 10:37",to:107.03,w:56.56,j:50.47}
  ]
};

function $(n){
  if(n==null)return'—';
  if(n>=1e3)return'$'+n.toFixed(0);
  if(n>=1)return'$'+n.toFixed(2);
  if(n>=0.01)return'$'+n.toFixed(4);
  return'$'+n.toFixed(6);
}
function q(n){
  if(!n)return'0';return n>=1e3?n.toFixed(0):n>=1?n.toFixed(2):n.toFixed(4);
}
function at(a){return a==='WILD'?'<span class="tg tw">W</span>':'<span class="tg tj">J</span>';}
function sb(s){return s==='buy'||s==='Buy'?'<span class="g" style="font-weight:700;font-size:9px">B</span>':'<span class="r" style="font-weight:700;font-size:9px">S</span>';}

// ===== RENDER =====
var h='';

// 3 BIG BOXES: Total | WILD | JOAKO
h+='<div class="t">';
h+='<div class="c" style="padding:8px;text-align:center">';
h+='<div class="x gr" style="font-size:11px;letter-spacing:1px">TOTAL</div>';
h+='<div class="v '+(d.pnl>=0?'g':'r')+'" style="font-size:28px">'+$(d.cap)+'</div>';
h+='<div style="font-size:12px" class="'+(d.pnl>=0?'g':'r')+'">'+(d.pnl>=0?'+':'')+$(d.pnl)+' ('+(d.pnl>=0?'+':'')+d.pnlp+'%)</div>';
h+='</div>';
var wa=d.acc.WILD,wap=wa.c-wa.s;
h+='<div class="c" style="padding:8px;text-align:center">';
h+='<div class="x gr" style="font-size:11px;letter-spacing:1px">WILD</div>';
h+='<div class="v '+(wap>=0?'g':'r')+'" style="font-size:28px">'+$(wa.c)+'</div>';
h+='<div style="font-size:12px" class="'+(wap>=0?'g':'r')+'">'+(wap>=0?'+':'')+$(wap)+'</div>';
h+='</div>';
var ja=d.acc.JOAKO,jap=ja.c-ja.s;
h+='<div class="c" style="padding:8px;text-align:center">';
h+='<div class="x gr" style="font-size:11px;letter-spacing:1px">JOAKO</div>';
h+='<div class="v '+(jap>=0?'g':'r')+'" style="font-size:28px">'+$(ja.c)+'</div>';
h+='<div style="font-size:12px" class="'+(jap>=0?'g':'r')+'">'+(jap>=0?'+':'')+$(jap)+'</div>';
h+='</div>';
h+='</div>';

// TWO-COLUMN: positions + charts
h+='<div class="h">';

// LEFT: Positions bigger
h+='<div><div class="c" style="padding:6px 8px"><span class="h3" style="font-size:10px">📌 Posiciones ('+d.pos.length+')</span>';
d.pos.sort(function(a,b){return a.s.localeCompare(b.s);});
for(var i=0;i<d.pos.length;i++){
  var p=d.pos[i],lp=p.pr||0,pct=((lp/p.e)-1)*100,a=Math.round(pct);
  var pctStr=(a>=0?'+':'')+a+'%';
  h+='<div class="pc" style="padding:4px 6px">';
  h+='<span style="font-size:14px;font-weight:700;color:#f1f5f9">'+p.s+'</span> '+at(p.a)+' <span style="font-size:12px;font-weight:700" class="'+(pct>=0?'g':'r')+'">'+pctStr+'</span>';
  h+='<div style="font-size:12px;color:#64748b;margin-top:2px">Entry: <span style="color:#cbd5e1">'+$(p.e)+'</span> | Actual: <span style="color:#cbd5e1">'+$(lp)+'</span> | Qty: '+q(p.q)+'</div>';
  h+='<div class="tg2" style="font-size:10px">Stop: <span class="r" style="font-weight:600">'+$(p.st)+'</span> | +8% <s>'+$(p.t8)+'</s> +15% <s>'+$(p.t15)+'</s> +25% <s>'+$(p.t25)+'</s></div>';
  h+='</div>';
}
h+='</div></div>';

// RIGHT: BTC + ETH candlestick (bigger)
h+='<div>';
h+='<div class="c" style="padding:6px 8px"><div class="h3" style="font-size:10px">🕯 BTC 15m</div><canvas id="btcChart" style="width:100%;height:180px"></canvas></div>';
h+='<div class="c" style="padding:6px 8px"><div class="h3" style="font-size:10px">🕯 ETH 15m</div><canvas id="ethChart" style="width:100%;height:180px"></canvas></div>';
h+='</div>';

h+='</div>';

// TRADES
h+='<div class="c" style="padding:4px 6px"><span class="h3">📜 Trades ('+d.tr.length+')</span>';
if(d.tr.length){
  h+='<table><thead><tr><th>Fecha</th><th>Sim</th><th>T</th><th style="text-align:right">Pr.</th><th style="text-align:right">Q</th><th>Cuenta</th></tr></thead><tbody>';
  for(var i=d.tr.length-1;i>=0;i--){
    var t=d.tr[i];
    h+='<tr><td class="gr">'+(t.d||'—').substring(0,11)+'</td><td style="font-weight:600">'+t.s+'</td><td>'+sb(t.sd)+'</td><td style="text-align:right">'+$(t.p)+'</td><td style="text-align:right">'+q(t.q)+'</td><td>'+at(t.ac)+'</td></tr>';
  }
  h+='</tbody></table>';
}
h+='</div>';

document.getElementById('a').innerHTML=h;

// ===== DRAW CANDLESTICK CHARTS =====
fetchAndDrawCandles('btcChart','BTCUSDT');
fetchAndDrawCandles('ethChart','ETHUSDT');

async function fetchAndDrawCandles(id,symbol){
  var can=document.getElementById(id);
  if(!can)return;
  try{
    var r=await fetch('https://api.bybit.com/v5/market/kline?category=spot&symbol='+symbol+'&interval=15&limit=60');
    var j=await r.json();
    if(j.retCode!==0||!j.result||!j.result.list)return;
    var raw=j.result.list.reverse();
    drawCandles(id,raw);
  }catch(e){}
}

function drawCandles(id,data){
  var can=document.getElementById(id);
  if(!can||!data||data.length<2)return;
  var ctx=can.getContext('2d'),w=can.offsetWidth||300,he=180;
  can.width=w*2;can.height=he*2;can.style.width=w+'px';can.style.height=he+'px';
  ctx.scale(2,2);
  var pad={t:10,b:12,l:32,r:5},cw=w-pad.l-pad.r,ch=he-pad.t-pad.b;
  
  var o=[],h=[],l=[],c=[];
  for(var i=0;i<data.length;i++){
    o.push(parseFloat(data[i][1]));h.push(parseFloat(data[i][2]));
    l.push(parseFloat(data[i][3]));c.push(parseFloat(data[i][4]));
  }
  var max=-1e9,min=1e9;
  for(var i=0;i<data.length;i++){
    if(h[i]>max)max=h[i];if(l[i]<min)min=l[i];
  }
  var range=max-min||1;min-=range*0.05;max+=range*0.05;range=max-min;
  
  // Grid
  ctx.strokeStyle='rgba(255,255,255,0.03)';ctx.lineWidth=0.5;
  for(var y=0;y<=3;y++){
    var yy=pad.t+(ch/3)*y;
    ctx.beginPath();ctx.moveTo(pad.l,yy);ctx.lineTo(w-pad.r,yy);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='7px sans-serif';ctx.textAlign='right';
    var tmp=max-(range/3)*y;
    ctx.fillText(tmp.toFixed(tmp>10?0:3),pad.l-2,yy+2);
  }
  
  var candleW=Math.max(1,cw/data.length-1);
  for(var i=0;i<data.length;i++){
    var x=pad.l+(cw/data.length)*i;
    var yO=pad.t+ch-((o[i]-min)/range)*ch;
    var yC=pad.t+ch-((c[i]-min)/range)*ch;
    var yH=pad.t+ch-((h[i]-min)/range)*ch;
    var yL=pad.t+ch-((l[i]-min)/range)*ch;
    var isGreen=c[i]>=o[i];
    var color=isGreen?'#4ade80':'#f87171';
    ctx.strokeStyle=color;ctx.lineWidth=0.8;
    ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();
    var top=Math.min(yO,yC),bot=Math.max(yO,yC);
    ctx.fillStyle=color;
    ctx.fillRect(x-candleW/2,top,candleW,Math.max(1,bot-top));
  }
}
})();
</script>
</body>
</html>

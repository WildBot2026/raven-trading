<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Raven Trading</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f1a;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;padding:12px;min-height:100vh}
.glow{box-shadow:0 0 20px rgba(99,102,241,0.08)}
.card{background:rgba(17,17,34,0.85);border:1px solid rgba(255,255,255,0.06);border-radius:12px;padding:12px;margin-bottom:10px}
.card h3{color:#64748b;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.val{font-size:18px;font-weight:800}
.green{color:#4ade80}
.red{color:#f87171}
.gray{color:#64748b}
.indigo{color:#818cf8}
.text-xs{font-size:11px}
.text-sm{font-size:13px}
.text-lg{font-size:16px}
.mt-1{margin-top:4px}
.mt-2{margin-top:8px}
.mb-2{margin-bottom:8px}
.flex{display:flex}
.justify-between{justify-content:space-between}
.items-center{align-items:center}
.gap-1{gap:4px}
.gap-2{gap:8px}
.w-full{width:100%}
.pos-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px;margin-bottom:6px}
.tag{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:600}
.tag-wild{background:rgba(129,140,248,0.15);color:#818cf8}
.tag-joako{background:rgba(52,211,153,0.15);color:#34d399}
.target{font-size:10px;color:#64748b}
.target span{color:#4ade80;font-weight:600}
table{width:100%;font-size:11px;border-collapse:collapse}
th{color:#64748b;font-weight:500;text-align:left;padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.06)}
td{padding:4px 6px;border-bottom:1px solid rgba(255,255,255,0.03)}
</style>
</head>
<body>

<div id="app"></div>

<script>
const API = 'https://raw.githubusercontent.com/WildBot2026/raven-trading/main/data.json?_=' + Date.now();

// Fallback hardcoded trades
const FALLBACK = [
  {date:'2026-05-04 19:06',symbol:'ATH',side:'buy',qty:2143.854,price:0.0062,value:13.29,pnl:0,account:'WILD'},
  {date:'2026-05-04 08:40',symbol:'ONDO',side:'buy',qty:121.7,price:0.3112,value:37.87,pnl:0,account:'WILD'},
  {date:'2026-05-04 08:40',symbol:'ONDO',side:'buy',qty:88.16,price:0.3112,value:27.44,pnl:0,account:'JOAKO'},
  {date:'2026-05-04 19:02',symbol:'BILL',side:'sell',qty:954.6,price:0.0408,value:38.95,pnl:0,account:'WILD'}
];

function fmt$(n){if(n===undefined||n===null)return'—';if(n>=1000)return'$'+n.toFixed(0);if(n>=1)return'$'+n.toFixed(2);if(n>=0.01)return'$'+n.toFixed(4);return'$'+n.toFixed(6)}
function fmtQ(n){if(!n||n===0)return'0';if(n>=1000)return n.toFixed(0);if(n>=1)return n.toFixed(2);return n.toFixed(4)}
function pnl(n){return n>=0?'green':'red'}
function sideBadge(s){return s==='buy'?'<span style="color:#4ade80;font-weight:600">BUY</span>':'<span style="color:#f87171;font-weight:600">SELL</span>'}
function acct(a){return a==='WILD'?'<span class="tag tag-wild">WILD</span>':'<span class="tag tag-joako">JOAKO</span>'}

async function load(){
  let d;
  try{const r=await fetch(API);d=await r.json()}catch(e){d=null}
  if(!d||!d.positions){document.getElementById('app').innerHTML='<p class="red">Error cargando datos. <a href="'+API+'" style="color:#818cf8">Ver raw data</a></p>';return}
  
  let html='';
  
  // HEADER
  const pnl=d.pnlCycle||0;
  html+='<div class="card"><div class="flex justify-between items-center">';
  html+='<div><div class="text-xs gray">Capital</div><div class="val '+(pnl>=0?'green':'red')+'">'+fmt$(d.totalCapital)+'</div></div>';
  html+='<div style="text-align:right"><div class="text-xs gray">PNL</div><div class="val '+(pnl>=0?'green':'red')+'">'+(pnl>=0?'+':'')+fmt$(pnl)+'</div></div>';
  html+='</div><div class="text-xs gray mt-1">Inicio: '+fmt$(d.startCapital)+' · '+(d.btc?'BTC '+fmt$(d.btc.price):'')+'</div></div>';
  
  // ACCOUNTS
  if(d.accounts){
    html+='<div class="grid-2">';
    for(const a of ['WILD','JOAKO']){
      const ac=d.accounts[a];
      if(!ac)continue;
      const ap=ac.capital-ac.startCapital;
      html+='<div class="card"><h3>'+a+'</h3><div class="val '+(ap>=0?'green':'red')+'">'+fmt$(ac.capital)+'</div>';
      html+='<div class="text-xs mt-1">PNL: <span class="'+(ap>=0?'green':'red')+'">'+(ap>=0?'+':'')+fmt$(ap)+'</span></div></div>';
    }
    html+='</div>';
  }
  
  // POSITIONS (ALL OPEN, NO SCROLL)
  html+='<div class="card"><h3>Posiciones Abiertas ('+d.positions.length+')</h3>';
  const sorted=d.positions.slice().sort((a,b)=>a.symbol.localeCompare(b.symbol));
  sorted.forEach(function(p){
    const lipp=(window.livePrices&&window.livePrices[p.symbol]!==undefined)?window.livePrices[p.symbol]:(p.currentPrice||0);
    const pp=(lipp-p.entryPrice)*p.qty;
    const pct=((lipp/p.entryPrice)-1)*100;
    html+='<div class="pos-card"><div class="flex justify-between items-center">';
    html+='<div><span style="font-size:15px;font-weight:700;color:#f1f5f9">'+p.symbol+'</span> '+acct(p.account)+' <span class="'+(pct>=0?'green':'red')+'" style="font-size:12px;font-weight:600">'+(pct>=0?'+':'')+pct.toFixed(2)+'%</span></div>';
    html+='<span class="'+(pp>=0?'green':'red')+'" style="font-weight:700">'+(pp>=0?'+':'')+fmt$(pp)+'</span>';
    html+='</div><div class="text-xs mt-1">Entry: <span style="color:#cbd5e1;font-weight:500">'+fmt$(p.entryPrice)+'</span> · Qty: '+fmtQ(p.qty);
    html+=' · Stop: <span class="red">'+fmt$(p.stop)+'</span></div>';
    html+='<div class="target mt-1">Targets: +8% <span>'+fmt$(p.target8)+'</span> · +15% <span>'+fmt$(p.target15)+'</span> · +25% <span>'+fmt$(p.target25)+'</span></div>';
    html+='</div>';
  });
  html+='</div>';
  
  // TRADES
  const trades=d.trades&&d.trades.length?d.trades:FALLBACK;
  html+='<div class="card"><h3>Historial de Trades ('+trades.length+')</h3>';
  if(trades.length){
    html+='<table><thead><tr><th>Fecha</th><th>Símbolo</th><th>Tipo</th><th style="text-align:right">Precio</th><th style="text-align:right">Cant</th><th style="text-align:right">PNL</th><th>Cuenta</th></tr></thead><tbody>';
    trades.slice().reverse().forEach(function(t){
      html+='<tr><td class="gray">'+(t.date||'—')+'</td>';
      html+='<td style="font-weight:600">'+t.symbol+'</td>';
      html+='<td>'+sideBadge(t.side)+'</td>';
      html+='<td style="text-align:right">'+fmt$(t.price)+'</td>';
      html+='<td style="text-align:right">'+fmtQ(t.qty)+'</td>';
      const tp=t.pnl||0;
      html+='<td style="text-align:right;font-weight:600" class="'+(tp>=0?'green':'red')+'">'+(tp===0?'—':(tp>=0?'+':'')+fmt$(tp))+'</td>';
      html+='<td>'+acct(t.account)+'</td></tr>';
    });
    html+='</tbody></table>';
  }else{
    html+='<div class="gray" style="text-align:center;padding:16px">Sin trades registrados</div>';
  }
  html+='</div>';
  
  document.getElementById('app').innerHTML=html;
}

load();
</script>
</body>
</html>
